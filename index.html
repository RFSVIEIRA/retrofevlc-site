    <style>
        :root {
            --primary: #00ffcc;
            --accent: #ff00aa;
            --purple: #7b5eff;
            --dark: #0a0a0f;
            --darker: #050508;
            --gray: #1f1f2e;
        }
        
        body {
            background: var(--darker);
            color: #e0e0ff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0; padding: 0;
            line-height: 1.7;
            background-image: 
                radial-gradient(circle at 50% 20%, rgba(0, 255, 204, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(123, 94, 255, 0.06) 0%, transparent 50%);
        }

        header {
            background: linear-gradient(135deg, #1a0033 0%, #0a0a0f 100%);
            padding: 100px 20px 80px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 3px solid var(--primary);
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(0,255,204,0.1) 0%, transparent 70%);
            animation: pulse 20s infinite linear;
        }

        @keyframes pulse { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .logo { max-width: 280px; margin-bottom: 20px; filter: drop-shadow(0 0 25px var(--primary)); }

        h1 { color: var(--primary); font-size: 4.2rem; margin: 10px 0 15px 0; text-shadow: 0 0 30px rgba(0, 255, 204, 0.6); letter-spacing: -2px; }

        .subtitle { font-size: 1.55rem; color: #b0b0ff; margin-bottom: 40px; max-width: 820px; margin-left: auto; margin-right: auto; }

        .lang-switch {
            position: absolute; top: 25px; right: 25px;
            background: rgba(15,15,35,0.95); padding: 10px; border-radius: 12px;
            border: 1px solid rgba(0,255,204,0.3); display: flex; gap: 8px;
        }

        .lang-btn {
            background: transparent; border: 1px solid #444; color: #ccc;
            padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600;
        }
        .lang-btn.active { background: var(--primary); color: #000; box-shadow: 0 0 15px rgba(0,255,204,0.5); }

        nav { background: rgba(10,10,15,0.98); padding: 18px 0; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(0,255,204,0.2); }
        nav ul { list-style: none; margin: 0; padding: 0; display: flex; justify-content: center; flex-wrap: wrap; gap: 30px; }
        nav a { color: #ddd; text-decoration: none; font-weight: 600; font-size: 1.05rem; }
        nav a:hover { color: var(--primary); }

        .container { max-width: 1180px; margin: 50px auto; padding: 0 20px; }

        h2 { color: var(--primary); font-size: 2.6rem; text-align: center; margin-bottom: 40px; text-shadow: 0 0 20px rgba(0,255,204,0.4); }

        .feature-grid, .addons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }

        .feature-card, .addon-card {
            background: var(--gray);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid rgba(0,255,204,0.15);
            transition: all 0.4s;
        }

        .addon-card { text-align: center; font-size: 1.1rem; font-weight: 600; }
        .addon-card:hover { transform: translateY(-8px); border-color: var(--primary); }

        .btn {
            display: inline-block;
            padding: 18px 38px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.25rem;
            margin: 15px 10px;
            transition: all 0.4s;
        }

        .btn-discord { background: linear-gradient(90deg, #5865F2, #7289da); color: white; }
        .btn-discord:hover { transform: scale(1.08); }

        .btn-download { background: linear-gradient(90deg, #00ffcc, #00ccaa); color: #000; font-weight: 800; }
        .btn-download:hover { transform: scale(1.08); }

        .social-bar {
            background: #0a0a0f;
            padding: 20px 0;
            text-align: center;
            border-top: 2px solid var(--primary);
        }
        .social-bar a { margin: 0 15px; font-size: 2rem; color: #bbb; transition: all 0.3s; }
        .social-bar a:hover { color: var(--primary); transform: scale(1.2); }

        footer { background: #050508; padding: 40px 20px; text-align: center; color: #777; font-size: 0.9rem; }

        .hidden { display: none !important; }
    </style>

<script>
// Translation system
async function loadLanguage(lang) {
    try {
        const response = await fetch(`translations/${lang}.json`);
        const trans = await response.json();

        document.querySelectorAll('[data-key]').forEach(el => {
            const key = el.getAttribute('data-key');
            if (trans[key]) el.innerHTML = trans[key];
        });

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.lang === lang);
        });

        document.documentElement.lang = lang;
    } catch (e) {
        console.error("Translation file not found");
    }
}

// Language buttons
const langs = [
    {code:'en', name:'EN'}, {code:'pt', name:'PT'},
    {code:'es', name:'ES'}, {code:'fr', name:'FR'},
    {code:'it', name:'IT'}, {code:'ru', name:'RU'}, {code:'zh', name:'ZH'}
];

const switchDiv = document.getElementById('langSwitch');
langs.forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'lang-btn';
    btn.textContent = l.name;
    btn.dataset.lang = l.code;
    btn.onclick = () => loadLanguage(l.code);
    switchDiv.appendChild(btn);
});

loadLanguage('en');   // Start in English
</script>
